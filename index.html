<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment-04</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#f8fafc] min-h-screen">
    <main class="max-w-[1110px] mx-auto">
        <section class="pt-[60px]">
            <h1 class="font-bold text-[32px] text-[#002C5C]">Job Application Tracker</h1>
            <section class="grid grid-cols-3 justify-content-between items-center gap-4 mt-5">
                <div class="bg-white border-2 border-[#f1f2f4] p-5 rounded-lg space-y-2">
                    <p class="text-sm font-medium">Total</p>
                    <h2 class="text-2xl font-bold bg-gradient-to-r from-[#002B70] to-[#0060FA] inline-block bg-clip-text text-transparent">0</h2>
                </div>
                <div class="bg-white border-2 border-[#f1f2f4] p-5 rounded-lg space-y-2">
                    <p class="text-sm font-medium">Interview</p>
                    <h2 class="text-2xl font-bold text-[#10b981]">0</h2>
                </div>
                <div class="bg-white border-2 border-[#f1f2f4] p-5 rounded-lg space-y-2">
                    <p class="text-sm font-medium">Rejected</p>
                    <h2 class="text-2xl font-bold text-[#ef4444]">0</h2>
                </div>
            </section>
            <hr class="text-[#E6E7E9] my-[30px]">
        </section>
    </main>
</body>
</html>
